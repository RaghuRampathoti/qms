spring.application.name=queue

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/queue_system}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1441}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dev_only_secret_minimum_32_chars_long_change_in_prod}
jwt.expiration-ms=86400000

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── App ───────────────────────────────────────────────────────────────────────
app.token-prefix=HYD
app.avg-interview-minutes=20
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ── Mail — Brevo HTTP API ─────────────────────────────────────────────────────
# Get your API key from: https://app.brevo.com/settings/keys/api
brevo.api.key=${BREVO_API_KEY}

# From address — must match a verified sender/domain in your Brevo account
app.mail.from=rampathotiraghu8@gmail.com
app.mail.from-name=QMS Interview System

# ── Cloudinary ────────────────────────────────────────────────────────────────
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api_key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:your_api_secret}

# ── Multipart ─────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
